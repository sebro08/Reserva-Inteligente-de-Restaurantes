name: CI Backend

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: Tarea_1/backend/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: Tarea_1/backend

      - name: Run tests
        run: npm run test
        working-directory: Tarea_1/backend

      - name: Upload coverage (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: Tarea_1/backend/coverage