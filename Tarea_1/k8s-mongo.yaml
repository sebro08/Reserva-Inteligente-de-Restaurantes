# --------------------------
# MONGODB (Servicio Simple para Pruebas en K8s)
# Nota: No tiene Sharding, levantar los 9+ contenedores de Sharding 
# palma la pc. Se recomienda que el video de Mongo Sharded 
# se grabe en docker-compose y aquí solo se ilustre que la API puede cambiar
# de tecnología si DB_TYPE = mongo. (Preguntar al profe igual)
# --------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: restaurante-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo
  template:
    metadata:
      labels:
        app: mongo
    spec:
      containers:
      - name: mongo
        image: mongo:6.0
        ports:
        - containerPort: 27017
        resources:
          limits:
            memory: "256Mi"
            cpu: "300m"
        # En MongoDB simple el start-up es automático.
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-svc
  namespace: restaurante-app
spec:
  selector:
    app: mongo
  ports:
  - port: 27017
    targetPort: 27017