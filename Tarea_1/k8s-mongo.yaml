# --------------------------
# MONGODB SHARDED CLUSTER (No se probó directamente en kubernetes por temas de
# recursos y potencia de la máquina local, pero se diseñó con las mejores prácticas y está
# probado en el compose)
# --------------------------

# ==========================================
# 1. CONFIG SERVERS (Almacenan la metadata)
# ==========================================
apiVersion: v1
kind: Service
metadata:
  name: mongo-config-svc
  namespace: restaurante-app
spec:
  clusterIP: None # Headless service
  selector:
    app: mongo-config
  ports:
  - port: 27019
    targetPort: 27019
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-config
  namespace: restaurante-app
spec:
  serviceName: "mongo-config-svc"
  replicas: 3
  selector:
    matchLabels:
      app: mongo-config
  template:
    metadata:
      labels:
        app: mongo-config
    spec:
      containers:
      - name: mongo-config
        image: mongo:6.0
        command: ["mongod", "--configsvr", "--replSet", "mongors1conf", "--bind_ip_all", "--port", "27019"]
        ports:
        - containerPort: 27019

# ==========================================
