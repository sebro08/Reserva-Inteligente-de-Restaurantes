# ==========================================
# 3. MONGOS ROUTERS
# ==========================================
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongos
  namespace: restaurante-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mongos
  template:
    metadata:
      labels:
        app: mongos
    spec:
      containers:
      - name: mongos
        image: mongo:6.0
        # Configuramos los routers indicándoles el DNS de los miembros del config server (StatefulSets)
        command: ["mongos", "--configdb", "mongors1conf/mongo-config-0.mongo-config-svc:27019,mongo-config-1.mongo-config-svc:27019,mongo-config-2.mongo-config-svc:27019", "--bind_ip_all", "--port", "27017"]
        ports:
        - containerPort: 27017

# Servicio visible para la API del Restaurante
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-svc
  namespace: restaurante-app
spec:
  selector:
    app: mongos
  ports:
  - port: 27017
    targetPort: 27017