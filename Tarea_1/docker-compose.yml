services:
  db:
    image: postgres:15-alpine
    container_name: restaurante_db
    ports:
    - "5433:5432"
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MongoDB Replication y Sharding
  mongocfg1:
    image: mongo:6.0
    container_name: mongocfg1
    profiles: ["mongo"]
    command: mongod --configsvr --replSet mongors1conf --dbpath /data/db --port 27019 --bind_ip_all

    volumes:
      - config1:/data/db
    networks:
      - app-network

  mongocfg2:
    image: mongo:6.0
    container_name: mongocfg2
    profiles: ["mongo"]
    command: mongod --configsvr --replSet mongors1conf --dbpath /data/db --port 27019 --bind_ip_all

    volumes:
      - config2:/data/db
    networks:
      - app-network

  mongocfg3:
    image: mongo:6.0
    container_name: mongocfg3
    profiles: ["mongo"]
    command: mongod --configsvr --replSet mongors1conf --dbpath /data/db --port 27019 --bind_ip_all

    volumes:
      - config3:/data/db
    networks:
      - app-network

  mongors1n1:
    image: mongo:6.0
    container_name: mongors1n1
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors1 --dbpath /data/db --port 27018 --bind_ip_all

    volumes:
      - data1:/data/db
    networks:
      - app-network

  mongors1n2:
    image: mongo:6.0
    container_name: mongors1n2
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors1 --dbpath /data/db --port 27018 --bind_ip_all

    volumes:
      - data2:/data/db
    networks:
      - app-network

  mongors1n3:
    image: mongo:6.0
    container_name: mongors1n3
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors1 --dbpath /data/db --port 27018 --bind_ip_all

    volumes:
      - data3:/data/db
    networks:
      - app-network

  mongors2n1:
    image: mongo:6.0
    container_name: mongors2n1
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors2 --dbpath /data/db --port 27018 --bind_ip_all

    volumes:
      - data4:/data/db
    networks:
      - app-network

  mongors2n2:
    image: mongo:6.0
    container_name: mongors2n2
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors2 --dbpath /data/db --port 27018 --bind_ip_all

    volumes:
      - data5:/data/db
    networks:
      - app-network

  mongors2n3:
    image: mongo:6.0
    container_name: mongors2n3
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors2 --dbpath /data/db --port 27018 --bind_ip_all

    volumes:
      - data6:/data/db
    networks:
      - app-network

  mongors3n1:
    image: mongo:6.0
    container_name: mongors3n1
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors3 --dbpath /data/db --port 27018 --bind_ip_all

    volumes:
      - data7:/data/db
    networks:
      - app-network

  mongors3n2:
    image: mongo:6.0
    container_name: mongors3n2
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors3 --dbpath /data/db --port 27018 --bind_ip_all

    volumes:
      - data8:/data/db
    networks:
      - app-network

  mongors3n3:
    image: mongo:6.0
    container_name: mongors3n3
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors3 --dbpath /data/db --port 27018 --bind_ip_all

    volumes:
      - data9:/data/db
    networks:
      - app-network

  mongos1:
    image: mongo:6.0
    container_name: mongos1
    profiles: ["mongo"]
    depends_on:
      - mongocfg1
      - mongocfg2
      - mongocfg3
      - mongors1n1
      - mongors1n2
      - mongors1n3
      - mongors2n1
      - mongors2n2
      - mongors2n3
      - mongors3n1
      - mongors3n2
      - mongors3n3
    command: mongos --configdb mongors1conf/mongocfg1:27019,mongocfg2:27019,mongocfg3:27019 --bind_ip_all --port 27017
    ports:
      - "${MONGOS1_PORT:-127.0.0.1:27017}:27017"
    networks:
      - app-network

  mongos2:
    image: mongo:6.0
    container_name: mongos2
    profiles: ["mongo"]
    depends_on:
      - mongocfg1
      - mongocfg2
      - mongocfg3
      - mongors1n1
      - mongors1n2
      - mongors1n3
      - mongors2n1
      - mongors2n2
      - mongors2n3
      - mongors3n1
      - mongors3n2
      - mongors3n3
    command: mongos --configdb mongors1conf/mongocfg1:27019,mongocfg2:27019,mongocfg3:27019 --bind_ip_all --port 27017
    ports:
      - "${MONGOS2_PORT:-127.0.0.1:27027}:27017"
    networks:
      - app-network

  mongoinit:
    image: mongo:6.0
    container_name: mongoinit
    profiles: ["mongo"]
    depends_on:
      - mongos1
      - mongos2
    networks:
      - app-network
    volumes:
      - ./backend/infra-mongo/init.sh:/init.sh
      - ./backend/infra-mongo/seed.js:/seed.js
    command: bash -c "bash /init.sh"

  # Servicios comunes
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: restaurante_auth
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN_USER}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: restaurante_redis
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      # Limitar heap de la JVM a 512MB (por defecto reserva mucho mas)
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    mem_limit: 1g
    ports:
      - "9200:9200"
    networks:
      - app-network

  neo4j:
    image: neo4j:5.26
    container_name: neo4j
    restart: on-failure
    environment:
      - NEO4J_AUTH=neo4j/password123
      # APOC core (incluido en la imagen) habilita apoc.algo.dijkstra para
      # calcular caminos minimos PONDERADOS por km en las rutas de entrega.
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - app-network

  search-service:
    build:
      context: ./search-service
    expose:
      - "3001"
    restart: on-failure
    environment:
      - ELASTIC_URL=http://elasticsearch:9200
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - elasticsearch
      - db
    networks:
      - app-network
      
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    expose:
      - "3000"
    environment:
      - DB_TYPE=${DB_TYPE:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - MONGO_URI=mongodb://mongos1:27017,mongos2:27017
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - KEYCLOAK_URL=http://localhost:8080
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - REDIS_URL=redis://redis:6379
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
        required: false
      mongos1:
        condition: service_started
        required: false
      mongos2:
        condition: service_started
        required: false
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - app-network

  # Load Balancer Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx_balancer
    ports:
      - "80:80"
    restart: on-failure
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - search-service
    networks:
      - app-network

  # -----------------------------------------------------
  # VISUALIZACIÓN (METABASE - Track C)
  # Perfil "viz": docker compose --profile viz up -d metabase
  # Se conecta a Postgres (db) para construir los 3 dashboards obligatorios.
  # Su configuración (conexiones y dashboards) se guarda en una app-db H2 dentro
  # del volumen metabase_data: sobrevive a 'stop/start' y 'down' (SIN -v); un
  # 'down -v' sí borra los dashboards (ver docs/track_c_metabase.md).
  # -----------------------------------------------------
  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    profiles: ["viz"]
    restart: on-failure
    ports:
      - "3030:3000" # Metabase escucha en 3000; lo publicamos en 3030 en el host
    environment:
      - MB_DB_TYPE=h2
      - MB_DB_FILE=/metabase-data/metabase.db
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      - db
    networks:
      - app-network

  # -----------------------------------------------------
  # INFRAESTRUCTURA ANALÍTICA (AIRFLOW + HIVE/HADOOP)
  # Perfil "data": Para iniciar usar: docker-compose --profile data up -d
  # -----------------------------------------------------

  # --- Apache Airflow ---
  postgres-airflow:
    image: postgres:15-alpine
    container_name: postgres-airflow
    profiles: ["data"]
    environment:
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow
      - POSTGRES_DB=airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-init:
    image: apache/airflow:2.8.2
    container_name: airflow-init
    profiles: ["data"]
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      - _AIRFLOW_DB_UPGRADE=true
      - _AIRFLOW_WWW_USER_CREATE=true
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
      - _AIRFLOW_WWW_USER_FIRSTNAME=Admin
      - _AIRFLOW_WWW_USER_LASTNAME=User
      - _AIRFLOW_WWW_USER_EMAIL=admin@restaurante.local
      - _AIRFLOW_WWW_USER_ROLE=Admin
    command: version
    # Espera a que postgres-airflow esté realmente listo (no solo iniciado)
    depends_on:
      postgres-airflow:
        condition: service_healthy
    networks:
      - app-network

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: restaurante_airflow:latest
    container_name: airflow-webserver
    profiles: ["data"]
    restart: on-failure
    ports:
      - "8081:8080" # Se cambió el puerto a 8081 porque Keycloak usa el 8080
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY:-restaurante_secret_2025}
      # Coordenadas internas (red Docker) + credenciales del .env, iguales que en
      # el scheduler, para que el DAG se parsee igual en ambos contenedores.
      - DB_TYPE=${DB_TYPE:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-restaurante_admin}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_NAME=${DB_NAME:-restaurante_db}
    command: webserver
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - app-network

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    image: restaurante_airflow:latest
    container_name: airflow-scheduler
    profiles: ["data"]
    restart: on-failure
    # El usuario airflow (uid 50000) tiene GID 0 (grupo root) en la imagen oficial,
    # lo que le da acceso al socket de Docker en Docker Desktop sin necesitar ser root.
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://airflow:airflow@postgres-airflow/airflow
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW_FERNET_KEY:-ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=}
      - AIRFLOW__WEBSERVER__SECRET_KEY=${AIRFLOW_SECRET_KEY:-restaurante_secret_2025}
      # DB_TYPE que el DAG lee para elegir la fuente del ETL (postgres o mongo).
      # Se toma del .env; el DAG fija los hosts/URIs correctos de la red Docker.
      - DB_TYPE=${DB_TYPE:-postgres}
      # DB_HOST/DB_PORT = coordenadas DENTRO de la red Docker (servicio "db",
      # puerto interno 5432). NO se toman del .env, que apunta al host
      # (localhost:5433, el puerto publicado) y no funciona entre contenedores.
      - DB_HOST=db
      - DB_PORT=5432
      # Credenciales/nombre SÍ del .env, para usar la contraseña REAL (no hardcodeada).
      - DB_USERNAME=${DB_USERNAME:-restaurante_admin}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_NAME=${DB_NAME:-restaurante_db}
    command: scheduler
    volumes:
      - ./dags:/opt/airflow/dags
      - ./logs:/opt/airflow/logs
      - ./plugins:/opt/airflow/plugins
      # Socket de Docker: permite que DockerOperator lance contenedores hermanos
      # (el contenedor de Spark se crea en el mismo Docker del host)
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres-airflow:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    networks:
      - app-network

  # --- Apache Hive & Hadoop (Mínimo necesario) ---
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    profiles: ["data"]
    restart: on-failure
    environment:
      - CLUSTER_NAME=test
    env_file:
      - ./hadoop.env
    ports:
      - "9870:9870"
    volumes:
      - namenode_data:/hadoop/dfs/name
    networks:
      - app-network

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    profiles: ["data"]
    restart: on-failure
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    env_file:
      - ./hadoop.env
    volumes:
      - datanode_data:/hadoop/dfs/data
    networks:
      - app-network

  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: hive-metastore-postgresql
    profiles: ["data"]
    restart: on-failure
    networks:
      - app-network

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    profiles: ["data"]
    restart: on-failure
    env_file:
      - ./hadoop.env
    environment:
      - SERVICE_PRECONDITION=namenode:9870 datanode:9864 hive-metastore-postgresql:5432
    command: /opt/hive/bin/hive --service metastore
    ports:
      - "9083:9083"
    networks:
      - app-network

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    profiles: ["data"]
    restart: on-failure
    env_file:
      - ./hadoop.env
    environment:
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionURL=jdbc:postgresql://hive-metastore-postgresql/metastore
      - SERVICE_PRECONDITION=hive-metastore:9083
    ports:
      - "10000:10000"
    volumes:
      - ./hive_scripts:/hive_scripts
    networks:
      - app-network

  # --- Apache Spark (Ejecución Temporal) ---
  # Este servicio sirve para DOS cosas:
  #   1. Construir la imagen "restaurante_spark:latest" (docker-compose build spark-submit)
  #   2. Ejecutar el ETL manualmente (docker-compose --profile spark-job run --rm spark-submit)
  # Airflow usa esa misma imagen vía DockerOperator (no necesita este servicio corriendo)
  spark-submit:
    build:
      context: .
      dockerfile: Dockerfile.spark
    image: restaurante_spark:latest
    container_name: spark-submit
    profiles: ["spark-job"]
    environment:
      # DB_TYPE controla la fuente del ETL: "postgres" (default) o "mongo"
      - DB_TYPE=${DB_TYPE:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME:-restaurante_admin}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_NAME=${DB_NAME:-restaurante_db}
      # Nota: dentro de la red Docker ambos mongos escuchan en puerto 27017 interno
      - MONGO_URI=${MONGO_URI:-mongodb://mongos1:27017,mongos2:27017}
      - MONGO_DB_NAME=${MONGO_DB_NAME:-restaurant_db}
    networks:
      - app-network
    # El CMD está definido en Dockerfile.spark — no hace falta repetirlo aquí

networks:
  app-network:
    driver: bridge
    # Nombre fijo para que DockerOperator de Airflow pueda referenciar la red
    # sin necesitar el prefijo del proyecto (ej. "tarea_1_app-network")
    name: app-network

volumes:
  postgres_data:
  config1:
  config2:
  config3:
  data1:
  data2:
  data3:
  data4:
  data5:
  data6:
  data7:
  data8:
  data9:
  postgres_airflow_data:
  namenode_data:
  datanode_data:
  neo4j_data:
  neo4j_logs:
  metabase_data:
