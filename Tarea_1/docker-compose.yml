services:
  db:
    image: postgres:15-alpine
    container_name: restaurante_db
    environment:
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MongoDB Replication y Sharding
  mongocfg1:
    image: mongo:6.0
    container_name: mongocfg1
    profiles: ["mongo"]
    command: mongod --configsvr --replSet mongors1conf --dbpath /data/db --port 27019 --bind_ip_all
    ports:
      - "27019:27019"
    volumes:
      - config1:/data/db
    networks:
      - app-network

  mongocfg2:
    image: mongo:6.0
    container_name: mongocfg2
    profiles: ["mongo"]
    command: mongod --configsvr --replSet mongors1conf --dbpath /data/db --port 27019 --bind_ip_all
    ports:
      - "27020:27019"
    volumes:
      - config2:/data/db
    networks:
      - app-network

  mongocfg3:
    image: mongo:6.0
    container_name: mongocfg3
    profiles: ["mongo"]
    command: mongod --configsvr --replSet mongors1conf --dbpath /data/db --port 27019 --bind_ip_all
    ports:
      - "27021:27019"
    volumes:
      - config3:/data/db
    networks:
      - app-network

  mongors1n1:
    image: mongo:6.0
    container_name: mongors1n1
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors1 --dbpath /data/db --port 27018 --bind_ip_all
    ports:
      - "27018:27018"
    volumes:
      - data1:/data/db
    networks:
      - app-network

  mongors1n2:
    image: mongo:6.0
    container_name: mongors1n2
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors1 --dbpath /data/db --port 27018 --bind_ip_all
    ports:
      - "27028:27018"
    volumes:
      - data2:/data/db
    networks:
      - app-network

  mongors1n3:
    image: mongo:6.0
    container_name: mongors1n3
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors1 --dbpath /data/db --port 27018 --bind_ip_all
    ports:
      - "27038:27018"
    volumes:
      - data3:/data/db
    networks:
      - app-network

  mongors2n1:
    image: mongo:6.0
    container_name: mongors2n1
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors2 --dbpath /data/db --port 27018 --bind_ip_all
    ports:
      - "27048:27018"
    volumes:
      - data4:/data/db
    networks:
      - app-network

  mongors2n2:
    image: mongo:6.0
    container_name: mongors2n2
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors2 --dbpath /data/db --port 27018 --bind_ip_all
    ports:
      - "27058:27018"
    volumes:
      - data5:/data/db
    networks:
      - app-network

  mongors2n3:
    image: mongo:6.0
    container_name: mongors2n3
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors2 --dbpath /data/db --port 27018 --bind_ip_all
    ports:
      - "27068:27018"
    volumes:
      - data6:/data/db
    networks:
      - app-network

  mongors3n1:
    image: mongo:6.0
    container_name: mongors3n1
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors3 --dbpath /data/db --port 27018 --bind_ip_all
    ports:
      - "27078:27018"
    volumes:
      - data7:/data/db
    networks:
      - app-network

  mongors3n2:
    image: mongo:6.0
    container_name: mongors3n2
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors3 --dbpath /data/db --port 27018 --bind_ip_all
    ports:
      - "27088:27018"
    volumes:
      - data8:/data/db
    networks:
      - app-network

  mongors3n3:
    image: mongo:6.0
    container_name: mongors3n3
    profiles: ["mongo"]
    command: mongod --shardsvr --replSet mongors3 --dbpath /data/db --port 27018 --bind_ip_all
    ports:
      - "27098:27018"
    volumes:
      - data9:/data/db
    networks:
      - app-network

  mongos1:
    image: mongo:6.0
    container_name: mongos1
    profiles: ["mongo"]
    depends_on:
      - mongocfg1
      - mongocfg2
      - mongocfg3
      - mongors1n1
      - mongors1n2
      - mongors1n3
      - mongors2n1
      - mongors2n2
      - mongors2n3
      - mongors3n1
      - mongors3n2
      - mongors3n3
    command: mongos --configdb mongors1conf/mongocfg1:27019,mongocfg2:27019,mongocfg3:27019 --bind_ip_all --port 27017
    ports:
      - "27017:27017"
    networks:
      - app-network

  mongos2:
    image: mongo:6.0
    container_name: mongos2
    profiles: ["mongo"]
    depends_on:
      - mongocfg1
      - mongocfg2
      - mongocfg3
      - mongors1n1
      - mongors1n2
      - mongors1n3
      - mongors2n1
      - mongors2n2
      - mongors2n3
      - mongors3n1
      - mongors3n2
      - mongors3n3
    command: mongos --configdb mongors1conf/mongocfg1:27019,mongocfg2:27019,mongocfg3:27019 --bind_ip_all --port 27017
    ports:
      - "27027:27017"
    networks:
      - app-network

  mongoinit:
    image: mongo:6.0
    container_name: mongoinit
    profiles: ["mongo"]
    depends_on:
      - mongos1
      - mongos2
    networks:
      - app-network
    volumes:
      - ./backend/infra-mongo/init.sh:/init.sh
      - ./backend/infra-mongo/seed.js:/seed.js
    command: bash -c "bash /init.sh"

  # Servicios comunes
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.1
    container_name: restaurante_auth
    command: start-dev --import-realm
    environment:
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN_USER}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD}
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm.json
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: restaurante_redis
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    ports:
      - "9200:9200"
    networks:
      - app-network

  search-service:
    build:
      context: ./search-service
    expose:
      - "3001"
    restart: on-failure
    environment:
      - ELASTIC_URL=http://elasticsearch:9200
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
    depends_on:
      - elasticsearch
      - db
    networks:
      - app-network
      
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: on-failure
    expose:
      - "3000"
    environment:
      - DB_TYPE=${DB_TYPE:-postgres}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - MONGO_URI=mongodb://mongos1:27017,mongos2:27017
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - KEYCLOAK_URL=http://localhost:8080
      - KEYCLOAK_REALM=${KEYCLOAK_REALM}
      - KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID}
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
        required: false
      mongos1:
        condition: service_started
        required: false
      mongos2:
        condition: service_started
        required: false
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy
    extra_hosts:
      - "localhost:host-gateway"
    networks:
      - app-network

  # Load Balancer Nginx
  nginx:
    image: nginx:alpine
    container_name: nginx_balancer
    ports:
      - "80:80"
    restart: on-failure
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - search-service
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  config1:
  config2:
  config3:
  data1:
  data2:
  data3:
  data4:
  data5:
  data6:
  data7:
  data8:
  data9: