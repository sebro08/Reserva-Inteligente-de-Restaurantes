apiVersion: v1
kind: Namespace
metadata:
  name: restaurante-app

---

# --------------------------
# CONFIG MAP DE VARIABLES
# --------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: env-config
  namespace: restaurante-app
data:
  DB_TYPE: "postgres" # Para usar Mongo, cambiamos esto a "mongo"
  DB_HOST: "postgres-svc"
  DB_PORT: "5432"
  DB_NAME: "restaurante_db"
  DB_USERNAME: "restaurante_admin"
  
  # -- Variables de MongoDB --
  # Descomenta la siguiente línea (26) si cambias DB_TYPE a "mongo". 
  # Apunta al servicio de mongo en k8s definido abajo.
  # MONGO_URI: "mongodb://mongo-svc:27017"
  MONGO_DB_NAME: "restaurant_db"

  KEYCLOAK_REALM: "restaurante"
  KEYCLOAK_CLIENT_ID: "restaurante-api"
  # URL interna para k8s (comunicación pod a pod)
  KEYCLOAK_URL: "http://keycloak-svc:8080/"
  REDIS_URL: "redis://redis-svc:6379"
  ELASTIC_URL: "http://elasticsearch-svc:9200"

---
apiVersion: v1
kind: Secret
metadata:
  name: db-secret
  namespace: restaurante-app
type: Opaque
stringData:
  DB_PASSWORD: "123lol"

---

# --------------------------
# REDIS
# --------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: restaurante-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          limits:
            memory: "128Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: restaurante-app
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379

---

# --------------------------
# POSTGRES
# --------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: restaurante-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: env-config
              key: DB_USERNAME
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secret
              key: DB_PASSWORD
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: env-config
              key: DB_NAME
        ports:
        - containerPort: 5432
        resources:
          limits:
            memory: "256Mi"
            cpu: "300m"

---
apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: restaurante-app
spec:
  selector:
    app: postgres
  ports:
  - port: 5432
    targetPort: 5432

---

# --------------------------
# ELASTICSEARCH
# --------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: restaurante-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
        env:
        - name: discovery.type
          value: "single-node"
        - name: xpack.security.enabled
          value: "false"
        # Limite de recursos (recomendación de la IA): ElasticSearch consume mucha RAM, le limitamos a 512MB
        - name: ES_JAVA_OPTS
          value: "-Xms256m -Xmx256m"
        ports:
        - containerPort: 9200
        resources:
          limits:
            memory: "600Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch-svc
  namespace: restaurante-app
spec:
  selector:
    app: elasticsearch
  ports:
  - port: 9200
    targetPort: 9200

---

# --------------------------
# KEYCLOAK
# --------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: restaurante-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:24.0.1
        command: ["start-dev"]
        env:
        - name: KEYCLOAK_ADMIN
          value: "admin"
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: "admin"
        # También limitamos Keycloak (Java)
        - name: JAVA_OPTS_APPEND
          value: "-Xmx256m -Xms128m"
        ports:
        - containerPort: 8080
        resources:
          limits:
            memory: "512Mi"
            cpu: "500m"
        # Nota: Por simplicidad no estamos importando el realm-export en K8s automático.
        # De momento hay que entrar a Keycloak (localhost:8080) e importarlo manual.

---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-svc
  namespace: restaurante-app
spec:
  type: LoadBalancer # Nos permite acceder desde fuera al puerto 8080 de keycloak localhost:8080
  selector:
    app: keycloak
  ports:
  - port: 8080
    targetPort: 8080

---

# --------------------------
# SEARCH-SERVICE
# --------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: search-service
  namespace: restaurante-app
spec:
  replicas: 2  # Demostrando escalabilidad del search service
  selector:
    matchLabels:
      app: search-service
  template:
    metadata:
      labels:
        app: search-service
    spec:
      containers:
      - name: search-service
        # ASEGURARSE de haber hecho build de esta imagen en local antes de ejecutarlo:
        # docker build -t search-service-img:latest ./search-service
        image: search-service-img:latest
        imagePullPolicy: Never # Usa la imagen local de la PC
        envFrom:
        - name: ELASTIC_URL
          valueFrom:
            configMapKeyRef:
              name: env-config
              key: ELASTIC_URL
        # Descomentar esto si se usa DB_TYPE: "mongo"
        # - name: MONGO_URI
        #   valueFrom:
        #     configMapKeyRef:
        #       name: env-config
        #       key: MONGO_URI
        # - name: MONGO_DB_NAME
        #   valueFrom:
        #     configMapKeyRef:
        #       name: env-config
        #       key: MONGO_DB_NAME
        ports:
        - containerPort: 3001
        resources:
          limits:
            memory: "128Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: search-service-svc
  namespace: restaurante-app
spec:
  selector:
    app: search-service
  ports:
  - port: 3001
    targetPort: 3001

---

# --------------------------
# API PRINCIPAL
# --------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: restaurante-app
spec:
  replicas: 3 # Demostrando escalabilidad de la API!
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        # ASEGURARSE de haber hecho build: docker build -t api-img:latest .
        image: api-img:latest
        imagePullPolicy: Never # Usa la imagen local de la PC
        envFrom:
        - name: ELASTIC_URL
          valueFrom:
            configMapKeyRef:
              name: env-config
              key: ELASTIC_URL
        # Descomentar esto si se usa DB_TYPE: "mongo"
        # - name: MONGO_URI
        #   valueFrom:
        #     configMapKeyRef:
        #       name: env-config
        #       key: MONGO_URI
        # - name: MONGO_DB_NAME
        #   valueFrom:
        #     configMapKeyRef:
        #       name: env-config
        #       key: MONGO_DB_NAME
        ports:
        - containerPort: 3000
        resources:
          limits:
            memory: "128Mi"
            cpu: "200m"

---
apiVersion: v1
kind: Service
metadata:
  name: api-svc
  namespace: restaurante-app
spec:
  selector:
    app: api
  ports:
  - port: 3000
    targetPort: 3000

---

# --------------------------
# LOAD BALANCER / NGINX (Ingres)
# --------------------------
# Como reemplazo del nginx manual, en Kubernetes podemos usar un Ingress,
# pero para no complicar el setup local de Docker Desktop, podemos usar
# otro contenedor Nginx con la misma configuración que exponga el puerto 80 local.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-balancer
  namespace: restaurante-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-balancer
  template:
    metadata:
      labels:
        app: nginx-balancer
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        # Usamos un ConfigMap para inyectar el nginx.conf original
        volumeMounts:
        - name: nginx-conf-volume
          mountPath: /etc/nginx/nginx.conf
          subPath: nginx.conf
        ports:
        - containerPort: 80
      volumes:
      - name: nginx-conf-volume
        configMap:
          name: nginx-config

---
apiVersion: v1
kind: Service
metadata:
  name: load-balancer-svc
  namespace: restaurante-app
spec:
  type: LoadBalancer # Nos expone al puerto localhost:80 de Windows
  selector:
    app: nginx-balancer
  ports:
  - port: 80
    targetPort: 80

---
# --------------------------
# CONFIG MAP PARA NGINX
# --------------------------
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: restaurante-app
data:
  nginx.conf: |-
    events { worker_connections 1024; }
    http {
        upstream api_backend {
            # En Kubernetes usamos el Service por DNS interno y el servicio K8s distribuye la carga a los PODS
            server api-svc:3000;
        }

        upstream search_backend {
            server search-service-svc:3001; 
        }

        server {
            listen 80;
            
            location /api/ {
                # Se envía el prefijo si es necesario, o usa rewrite
                proxy_pass http://api_backend/;
                proxy_set_header Host $host;
            }

            location /search/ {
                proxy_pass http://search_backend/;
                proxy_set_header Host $host;
            }
        }
    }